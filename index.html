<!DOCTYPE html>
<html>

<head>
    <title>Leaflet Draw</title>
    <meta charset="utf-8" />

    <!-- Leaflet CSS & JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet Draw -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>

    <!-- Leaflet MarkerCluster -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

    <!-- Bootstrap & jQuery -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>

    <style>
        /* Custom Popup Styles */
        .custom-popup .leaflet-popup-content-wrapper {
            padding: 0;
            border-radius: 2px;
            background: #e9ecf3;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        }
        .custom-popup .leaflet-popup-content {
            margin: 0;
            width: 250px !important;
            font-family: Arial, sans-serif;
            line-height: 1.4;
        }
        .custom-popup .popup-header {
            background: #515661;
            color: #ffffff;
            padding: 10px 30px 10px 15px;
            font-size: 13px;
            font-weight: bold;
        }
        .custom-popup .popup-body {
            padding: 15px;
        }
        .custom-popup .popup-label {
            color: #555555;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .custom-popup .popup-value {
            font-size: 12px;
            font-weight: bold;
            color: #222222;
            margin-top: 0;
            margin-bottom: 12px;
        }
        .custom-popup .popup-link {
            text-align: right;
            margin-top: 10px;
        }
        .custom-popup .popup-link a {
            color: #333333;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
        }
        .custom-popup .leaflet-popup-close-button {
            color: #ffffff !important;
            top: 7px !important;
            right: 8px !important;
            font-size: 18px !important;
            font-weight: normal;
        }
        .custom-popup .leaflet-popup-tip {
            background: #e9ecf3;
        }

        /* Custom Marker Styles */
        .custom-marker {
            background-color: #3194dc;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <h3>Showing map in Laravel with LeafletJS</h3>
        <div id="map" style="height: 600px"></div>
    </div>

    <script src="sample.js"></script>
    <script>
        // Map center
        var center = [12.5657, 104.9910];

        // Create map
        var map = L.map('map').setView(center, 7);

        // OSM Tiles
        // L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        //     attribution: 'Data © <a href="http://osm.org/copyright">OpenStreetMap</a>',
        //     maxZoom: 19
        // }).addTo(map);

        // OSM Tiles Hot
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: 'Map data © <a href="https://www.openstreetmap.org/">OpenStreetMap</a>',
            maxZoom: 19
        }).addTo(map);

        // Drawn items
        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            position: 'topright',
            draw: {
                polygon: false,
                polyline: false,
                circlemarker: false,
                rectangle: false,
                circle: false,
                marker: false
            },
            edit: {
                featureGroup: drawnItems,
                edit: false,
                remove: false
            }
        });
        map.addControl(drawControl);

        map.on('draw:created', function(e) {
            var layer = e.layer;
            drawnItems.addLayer(layer);
            $('#polygon').val(JSON.stringify(layer.toGeoJSON()));
        });

        // MarkerCluster + custom markers
        if (typeof sampleData !== 'undefined') {
            var customIcon = L.divIcon({
                className: 'custom-marker',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });

            var markers = L.markerClusterGroup({ maxClusterRadius: 20 });

            sampleData.forEach(function(point) {
                var marker = L.marker([point.lat, point.lng], { icon: customIcon });

                var popupContent = `
                    <div class="popup-header">${point.region}</div>
                    <div class="popup-body">
                        <div class="popup-label">PROJECT</div>
                        <div class="popup-value">${point.title}</div>
                        <div class="popup-label">COMMITMENT AMOUNT</div>
                        <div class="popup-value">${point.commitment}</div>
                        <div class="popup-label">APPROVAL DATE</div>
                        <div class="popup-value">${point.approvalDate}</div>
                        <div class="popup-label">CLOSING DATE</div>
                        <div class="popup-value">${point.closingDate}</div>
                        <div class="popup-link"><a href="${point.link}">View project</a></div>
                    </div>
                `;

                marker.bindPopup(popupContent, { className: 'custom-popup', closeButton: true });
                markers.addLayer(marker);
            });

            map.addLayer(markers);
        }
    </script>
</body>
</html>
