<!DOCTYPE html>
<html>

<head>
    <title>Leaflet Draw</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://d19vzq90twjlae.cloudfront.net/leaflet-0.7/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css" />
    <script src="https://d19vzq90twjlae.cloudfront.net/leaflet-0.7/leaflet.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/0.5.0/MarkerCluster.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/0.5.0/MarkerCluster.Default.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/0.5.0/leaflet.markercluster.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
    <style>
        /* Custom Popup Styles */
        .custom-popup .leaflet-popup-content-wrapper {
            padding: 0;
            border-radius: 2px;
            background: #e9ecf3;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.4);
        }
        .custom-popup .leaflet-popup-content {
            margin: 0;
            width: 250px !important;
            font-family: Arial, sans-serif;
            line-height: 1.4;
        }
        .custom-popup .popup-header {
            background: #515661;
            color: #ffffff;
            padding: 10px 30px 10px 15px;
            font-size: 13px;
            font-weight: bold;
        }
        .custom-popup .popup-body {
            padding: 15px;
        }
        .custom-popup .popup-label {
            color: #555555;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 3px;
        }
        .custom-popup .popup-value {
            font-size: 12px;
            font-weight: bold;
            color: #222222;
            margin-top: 0;
            margin-bottom: 12px;
        }
        .custom-popup .popup-link {
            text-align: right;
            margin-top: 10px;
        }
        .custom-popup .popup-link a {
            color: #333333;
            font-size: 13px;
            font-weight: bold;
            text-decoration: none;
        }
        .custom-popup .leaflet-popup-close-button {
            color: #ffffff !important;
            top: 7px !important;
            right: 8px !important;
            font-size: 18px !important;
            font-weight: normal;
        }
        .custom-popup .leaflet-popup-tip {
            background: #e9ecf3; /* match body bg */
        }
        
        /* Custom Marker Styles */
        .custom-marker {
            background-color: #3194dc;
            border: 2px solid #ffffff;
            border-radius: 50%;
            box-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>
    <div class="container">
        <span>
            <h3>Showing map in laravel with leafletJS</h3>
        </span>
        <form action="">

            <div id="map" style="height: 600px"></div>
            <br>
    </div>
    </form>

    <script src="sample.js"></script>
    <script>
        ///Setting the center of the map
        var center = [12.5657, 104.9910];

        // Create the map
        var map = L.map('map').setView(center, 7);

        // Set up the Open Street Map layer 
        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: 'Data © <a href="http://osm.org/copyright">OpenStreetMap</a>',
                maxZoom: 18
            }).addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            position: 'topright',
            draw: {
                polygon: false,
                polyline: false,
                circlemarker: false,
                rectangle: false,
                circle: false,
                marker: false
            },
            edit: {
                featureGroup: drawnItems,
                edit: false,
                remove: false
            }
        });
        map.addControl(drawControl);

        map.on('draw:created', function(e) {
            var type = e.layerType,
                layer = e.layer;

            drawnItems.addLayer(layer);
            $('#polygon').val(JSON.stringify(layer.toGeoJSON()));
        });

        // Add markers from sample.js data
        if (typeof sampleData !== 'undefined') {
            var customIcon = L.divIcon({
                className: 'custom-marker',
                iconSize: [16, 16],
                iconAnchor: [8, 8]
            });
            var markers = L.markerClusterGroup({
                maxClusterRadius: 20 // set to a smaller radius to mainly cluster items at identical/very close coordinates
            });

            sampleData.forEach(function(point) {
                var marker = L.marker([point.lat, point.lng], {icon: customIcon});
                
                var popupContent = `
                    <div class="popup-header">${point.region}</div>
                    <div class="popup-body">
                        <div class="popup-label">PROJECT</div>
                        <div class="popup-value">${point.title}</div>
                        
                        <div class="popup-label">COMMITMENT AMOUNT</div>
                        <div class="popup-value">${point.commitment}</div>
                        
                        <div class="popup-label">APPROVAL DATE</div>
                        <div class="popup-value">${point.approvalDate}</div>
                        
                        <div class="popup-label">CLOSING DATE</div>
                        <div class="popup-value">${point.closingDate}</div>
                        
                        <div class="popup-link"><a href="${point.link}">View project</a></div>
                    </div>
                `;
                
                marker.bindPopup(popupContent, {
                    className: 'custom-popup',
                    closeButton: true
                });
                
                markers.addLayer(marker);
            });
            map.addLayer(markers);
        }
    </script>
</body>

</html>
